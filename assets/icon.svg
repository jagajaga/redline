<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sq"><rect x="32" y="32" width="960" height="960" rx="200"/></clipPath>
    <clipPath id="big"><circle cx="512" cy="480" r="360"/></clipPath>
  </defs>
  <g clip-path="url(#sq)">
    <rect x="32" y="32" width="960" height="960" fill="#EDE5D2"/>

    <g clip-path="url(#big)">
      <rect x="32" y="32" width="960" height="960" fill="#F4EEDF"/>
      <g transform="rotate(28 512 480)"><rect x="-100" y="400" width="1300" height="140" fill="#EFC42B" opacity="0.4"/></g>
      <line x1="120" y1="150" x2="900" y2="820" stroke="#141414" stroke-width="8"/>
      <line x1="100" y1="760" x2="930" y2="230" stroke="#141414" stroke-width="8"/>

      <!-- the sessions, floating and submerged -->
      <circle cx="430" cy="360" r="110" fill="#2E8FA3" stroke="#141414" stroke-width="10"/>
      <circle cx="640" cy="520" r="82" fill="#D9452B"/>
      <circle cx="340" cy="600" r="64" fill="#EFC42B" stroke="#141414" stroke-width="9"/>
      <circle cx="620" cy="280" r="44" fill="#1F4E79"/>
      <circle cx="530" cy="660" r="30" fill="#141414"/>
      <circle cx="730" cy="400" r="24" fill="#EFC42B"/>
      <circle cx="280" cy="280" r="20" fill="#D9452B"/>
      <circle cx="760" cy="620" r="36" fill="none" stroke="#141414" stroke-width="8"/>

      <!-- the fuel: a tilted liquid level, tank just under half full -->
      <g transform="rotate(-4 512 560)">
        <rect x="60" y="560" width="910" height="500" fill="#2E8FA3" opacity="0.34"/>
        <line x1="60" y1="560" x2="970" y2="560" stroke="#141414" stroke-width="12"/>
      </g>
      <circle cx="252" cy="537" r="13" fill="#D9452B"/>
      <circle cx="700" cy="512" r="10" fill="#141414"/>
    </g>

    <!-- tank walls -->
    <circle cx="512" cy="480" r="360" fill="none" stroke="#141414" stroke-width="26"/>
    <circle cx="512" cy="480" r="392" fill="none" stroke="#141414" stroke-width="6"/>

    <!-- the leak: a clean breach through the tank wall, drops getting away -->
    <line x1="655" y1="762" x2="703" y2="857" stroke="#EDE5D2" stroke-width="86"/>
    <path d="M 690 806 q 26 10 18 40 q -30 2 -34 -22 q 2 -14 16 -18 z" fill="#2E8FA3" stroke="#141414" stroke-width="7"/>
    <circle cx="742" cy="912" r="19" fill="#2E8FA3" stroke="#141414" stroke-width="7"/>
    <circle cx="788" cy="962" r="12" fill="#2E8FA3"/>
    <circle cx="826" cy="1000" r="8" fill="#D9452B"/>

    <circle cx="150" cy="160" r="24" fill="#D9452B"/>
    <circle cx="872" cy="130" r="16" fill="#141414"/>
  </g>
</svg>
