<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 512" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26262b"/>
      <stop offset="1" stop-color="#1a1a1e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- menu bar strip -->
  <rect x="0" y="0" width="400" height="30" fill="#111114"/>
  <rect x="252" y="7" width="52" height="16" rx="8" fill="#2f2f34"/>
  <polyline points="258,20 264,17 270,19 276,13 282,15 288,11 294,14 299,12"
            fill="none" stroke="#30b0c7" stroke-width="1.6" stroke-linejoin="round"/>
  <text x="310" y="20" fill="#e8e8ea" font-size="12" font-weight="600">&#9660;0.4&#215;</text>
  <text x="352" y="20" fill="#6a6a6e" font-size="12">&#9834;</text>

  <!-- popover panel -->
  <g filter="url(#shadow)">
    <rect x="10" y="42" width="380" height="458" rx="14" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- governor header -->
  <text x="26" y="72" fill="#98989d" font-size="10.5" font-weight="700" letter-spacing="0.6">GOVERNOR &#183; MIX &#183; WEEKLY BINDING</text>
  <text x="26" y="100" fill="#30b0c7" font-size="24" font-weight="800">&#9660;0.4&#215;</text>
  <text x="374" y="72" text-anchor="end" fill="#c9c9ce" font-size="12.5">5h&#160;&#160;13%</text>
  <text x="374" y="90" text-anchor="end" fill="#c9c9ce" font-size="12.5">wk&#160;&#160;32%</text>
  <text x="26" y="122" fill="#98989d" font-size="12">16 active &#183; 20.9k/min &#183; cache 97%</text>
  <line x1="10" y1="136" x2="390" y2="136" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- session card 1 -->
  <circle cx="30" cy="160" r="4.5" fill="#78cd82"/>
  <text x="42" y="164" fill="#f2f2f4" font-size="13" font-weight="600">Claude dashboard</text>
  <text x="374" y="164" text-anchor="end" fill="#98989d" font-size="11.5">20.9k/min</text>
  <text x="42" y="181" fill="#98989d" font-size="10.5"><tspan fill="#30b0c7">opus</tspan>  &#183;  2.3M tok  &#183;  34% cpu  &#183;  512 MB  &#183;  local</text>
  <text x="42" y="197" fill="#30b0c7" font-size="10.5">&#9874;  Edit  engine.rs</text>
  <text x="42" y="213" fill="#98989d" font-size="10.5">3 agents &#183; 2 running</text>
  <text x="42" y="231" fill="#30b0c7" font-size="10.5">Kill&#160;&#160;&#160;&#160;&#160;Pause&#160;&#160;&#160;&#160;&#160;Resume</text>
  <line x1="10" y1="245" x2="390" y2="245" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- session card 2 -->
  <circle cx="30" cy="269" r="4.5" fill="#ff9f0a"/>
  <text x="42" y="273" fill="#f2f2f4" font-size="13" font-weight="600">Research AI chat architecture</text>
  <text x="374" y="273" text-anchor="end" fill="#98989d" font-size="11.5">8.1k/min</text>
  <text x="42" y="290" fill="#98989d" font-size="10.5"><tspan fill="#b58cff">fable</tspan>  &#183;  980k tok  &#183;  12% cpu  &#183;  310 MB  &#183;  local</text>
  <text x="42" y="306" fill="#30b0c7" font-size="10.5">&#9874;  Bash  cargo build --release</text>
  <text x="42" y="322" fill="#98989d" font-size="10.5">1 agent &#183; 1 running</text>
  <text x="42" y="340" fill="#30b0c7" font-size="10.5">Kill&#160;&#160;&#160;&#160;&#160;Pause&#160;&#160;&#160;&#160;&#160;Resume</text>
  <line x1="10" y1="354" x2="390" y2="354" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- session card 3 -->
  <circle cx="30" cy="378" r="4.5" fill="#78cd82"/>
  <text x="42" y="382" fill="#f2f2f4" font-size="13" font-weight="600">Blog post benchmarks</text>
  <text x="374" y="382" text-anchor="end" fill="#98989d" font-size="11.5">3.4k/min</text>
  <text x="42" y="399" fill="#98989d" font-size="10.5"><tspan fill="#ff9f0a">sonnet</tspan>  &#183;  221k tok  &#183;  6% cpu  &#183;  180 MB  &#183;  local</text>
  <text x="42" y="415" fill="#98989d" font-size="10.5">2 agents &#183; 1 running</text>
  <text x="42" y="433" fill="#30b0c7" font-size="10.5">Kill&#160;&#160;&#160;&#160;&#160;Pause&#160;&#160;&#160;&#160;&#160;Resume</text>
  <line x1="10" y1="452" x2="390" y2="452" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- footer -->
  <text x="26" y="479" fill="#c9c9ce" font-size="13">&#9881;  Settings  &#8964;</text>
  <rect x="236" y="466" width="42" height="22" rx="6" fill="#2f2f34"/>
  <text x="257" y="481" text-anchor="middle" fill="#e8e8ea" font-size="12.5">TUI</text>
  <rect x="284" y="466" width="80" height="22" rx="6" fill="#2f2f34"/>
  <text x="324" y="481" text-anchor="middle" fill="#e8e8ea" font-size="12.5">Dashboard</text>
</svg>
