    <text x="30" y="530" fill="#98989d">&#9656;</text>
    <circle cx="52" cy="526" r="4.5" fill="#78cd82"/>
    <text x="64" y="530" fill="#f2f2f4" font-weight="600">Blog post benchmarks</text>
    <text x="300" y="530" fill="#ff9f0a" font-size="11">sonnet</text>
    <text x="820" y="530" fill="#98989d" font-size="11.5">3.4k/min</text>
    <text x="892" y="530" text-anchor="end" fill="#e8e8ea" font-size="11.5">221k</text>
    <line x1="20" y1="548" x2="900" y2="548" stroke="#ffffff" stroke-opacity="0.05"/>

