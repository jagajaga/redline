    <text x="300" y="576" fill="#78cd82" font-size="11">haiku</text>
    <text x="820" y="576" fill="#98989d" font-size="11.5">idle</text>
    <text x="892" y="576" text-anchor="end" fill="#e8e8ea" font-size="11.5">64k</text>
