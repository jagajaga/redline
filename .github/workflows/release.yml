name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: cargo test --workspace
      - name: Build engine + TUI (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin --bin ccwatch --bin ccwatchd
          cargo build --release --target x86_64-apple-darwin --bin ccwatch --bin ccwatchd
      - name: Build the SwiftUI app (universal)
        run: swift build -c release --package-path app --arch arm64 --arch x86_64
      - name: Universal binaries
        run: |
          mkdir -p dist/ccwatch
          for bin in ccwatch ccwatchd; do
            lipo -create -output "dist/ccwatch/$bin" \
              "target/aarch64-apple-darwin/release/$bin" \
              "target/x86_64-apple-darwin/release/$bin"
            lipo -info "dist/ccwatch/$bin"
          done
          cp README.md dist/ccwatch/
          tar -C dist -czf "ccwatch-${GITHUB_REF_NAME}-macos-universal.tar.gz" ccwatch
      - name: App bundle (Redline)
        run: |
          APP="dist/Redline.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp assets/ccwatch.icns "$APP/Contents/Resources/"
          # One app: the SwiftUI `redline` owns both the tray and the window.
          # ccwatchd + ccwatch (TUI) ride along so it can spawn the daemon and
          # open the TUI from beside its own executable.
          cp app/.build/apple/Products/Release/Redline "$APP/Contents/MacOS/redline"
          cp dist/ccwatch/ccwatchd dist/ccwatch/ccwatch "$APP/Contents/MacOS/"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Redline</string>
              <key>CFBundleDisplayName</key><string>Redline</string>
              <key>CFBundleIdentifier</key><string>com.jagajaga.redline</string>
              <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleExecutable</key><string>redline</string>
              <key>CFBundleIconFile</key><string>ccwatch</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>LSMinimumSystemVersion</key><string>14.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep -s - "$APP"
          ditto -c -k --keepParent "$APP" "Redline-${GITHUB_REF_NAME}-macos.zip"
      - name: Disk image (drag-to-Applications)
        run: |
          # Stage the app next to an /Applications symlink so the DMG opens to
          # the familiar "drag Redline into Applications" layout.
          STAGE="dist/dmg"
          mkdir -p "$STAGE"
          cp -R "dist/Redline.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Redline" -srcfolder "$STAGE" \
            -ov -format UDZO "Redline-${GITHUB_REF_NAME}-macos.dmg"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Package browser extension
        env:
          # Add these as repo secrets to get a signed, installable Firefox .xpi;
          # without them, only the Chrome .zip is produced.
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          # AMO won't re-sign a version it has already signed, so stamp the
          # extension with this release's version (always increasing) to get a
          # fresh signature every release.
          ver="${GITHUB_REF_NAME#v}"
          python3 - "$ver" <<'PY'
          import json, sys
          p = "extension/manifest.json"
          d = json.load(open(p))
          d["version"] = sys.argv[1]
          json.dump(d, open(p, "w"), indent=2)
          PY
          bash extension/pack.sh dist-ext
          cp dist-ext/redline-usage-bridge-* . 2>/dev/null || true
      - name: Stable-named download aliases
        run: |
          # Version-stable filenames so the website can deep-link to
          # /releases/latest/download/<name> without breaking every release.
          for f in Redline-*.dmg; do cp "$f" Redline.dmg; done
          for f in redline-usage-bridge-chrome-*.zip; do cp "$f" redline-usage-bridge-chrome.zip; done
          for f in redline-usage-bridge-firefox-*.xpi; do [ -e "$f" ] && cp "$f" redline-usage-bridge-firefox.xpi; done
      - name: Checksums
        run: |
          shasum -a 256 ccwatch-*.tar.gz Redline-*.zip Redline-*.dmg \
            redline-usage-bridge-* > checksums.txt 2>/dev/null \
            || shasum -a 256 ccwatch-*.tar.gz Redline-*.zip Redline-*.dmg > checksums.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ccwatch-*.tar.gz Redline.dmg Redline-*.dmg Redline-*.zip \
            redline-usage-bridge-* checksums.txt \
            --title "Redline $GITHUB_REF_NAME" \
            --generate-notes
